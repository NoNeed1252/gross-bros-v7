<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GUARDIAN BROADCAST OS v8.7 BETA</title>
  <style>
    :root {
      --bg: #030607;
      --cyan: #00ffc8;
      --line: rgba(0,255,200,.15);
    }
    body {
      background: var(--bg);
      color: var(--cyan);
      font-family: monospace;
      margin: 0;
    }
    .shell { padding: 20px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 10px; border: 1px solid var(--line); cursor: pointer; }
    .tab.active { background: var(--cyan); color: var(--bg); }
    .section { display: none; }
    .section.active { display: block; }
    .nft-selection-track { display: flex; gap: 10px; overflow-x: auto; }
    .nft-select-card { border: 1px solid var(--line); padding: 10px; background: transparent; color: inherit; cursor: pointer; }
    .nft-select-card.active { border-color: var(--cyan); }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="tabs">
      <div class="tab active" data-tab="0" onclick="switchTab(0)">CONSOLE</div>
      <div class="tab" data-tab="1" onclick="switchTab(1)">STORYLINE</div>
      <div class="tab" data-tab="2" onclick="switchTab(2)">FUSION LAB</div>
    </nav>

    <main class="content">
      <section id="section-0" class="section active"><h1>CONSOLE</h1></section>
      <section id="section-1" class="section"><h1>LORE</h1></section>
      <section id="section-2" class="section">
        <div id="nft-selection-track" class="nft-selection-track"></div>
      </section>
    </main>
  </div>

  <script>
    const nftCollection = [
      { name: 'BRO #0001', image: '', tokenId: '0001', network: 'XRPL', traits: ['Genesis'] }
    ];
    const state = { selectedNft: null };

    function switchTab(index) {
      document.querySelectorAll('.tab').forEach((tab, i) => tab.classList.toggle('active', i === index));
      document.querySelectorAll('.section').forEach((section, i) => section.classList.toggle('active', i === index));
    }

    function sanitizeMarkup(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function getSelectedNft() {
      return state.selectedNft || nftCollection[0];
    }

    function renderNftSelection() {
      const track = document.getElementById('nft-selection-track');
      if (!track) return;
      track.innerHTML = nftCollection.map((nft, index) => {
        const active = getSelectedNft()?.name === nft.name;
        return [
          `<button type="button" class="nft-select-card ${active ? 'active' : ''}" onclick="selectNft(${index})">`,
          '  <img alt="' + sanitizeMarkup(nft.name) + '" src="' + nft.image + '">',
          '  <span class="label">' + sanitizeMarkup(nft.name) + '</span>',
          '  <span class="meta">' + sanitizeMarkup(nft.tokenId) + ' | ' + sanitizeMarkup(nft.network) + '<br>' + sanitizeMarkup((nft.traits || []).join(' | ')) + '</span>',
          '</button>'
        ].join('');
      }).join('');
    }

    function selectNft(index) {
      state.selectedNft = nftCollection[index];
      renderNftSelection();
    }

    function bootApp() {
      renderNftSelection();
    }

    window.switchTab = switchTab;
    window.selectNft = selectNft;
    document.addEventListener('DOMContentLoaded', bootApp);
  </script>
</body>
</html>
