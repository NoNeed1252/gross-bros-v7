<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>GROSS BROS // OS v8.7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan: #00ffc8;
      --neon-blue: #00e5ff;
      --bg: #030607;
      --line: rgba(0, 255, 200, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: #ddfff9;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .shell { flex: 1; display: flex; flex-direction: column; border: 1px solid var(--line); margin: 10px; position: relative; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--line);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
    .title { font-family: 'Orbitron', sans-serif; letter-spacing: .2em; font-size: 16px; color: var(--cyan); }
    
    .tabs { display: flex; border-bottom: 1px solid var(--line); background: rgba(0,0,0,0.3); }
    .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; transition: 0.2s; border-right: 1px solid var(--line); }
    .tab.active { background: rgba(0, 255, 200, 0.1); color: var(--cyan); box-shadow: inset 0 -2px 0 var(--cyan); }
    
    .content { flex: 1; overflow: auto; padding: 20px; }
    .section { display: none; }
    .section.active { display: block; }
    
    .panel { background: rgba(7, 18, 17, 0.6); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    
    .nft-selection-track { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
    .nft-select-card { flex: 0 0 130px; background: none; border: 1px solid var(--line); padding: 8px; cursor: pointer; text-align: left; transition: 0.2s; }
    .nft-select-card.active { border-color: var(--cyan); background: rgba(0, 255, 200, 0.05); }
    .nft-select-card img { width: 100%; border-radius: 4px; margin-bottom: 8px; }
    .nft-select-card .label { display: block; font-size: 11px; font-weight: bold; color: var(--cyan); margin-bottom: 4px; }
    .nft-select-card .meta { display: block; font-size: 9px; opacity: 0.6; line-height: 1.2; }

    .held-nft-panel { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
    .held-nft-image-wrapper img { width: 140px; border: 1px solid var(--cyan); border-radius: 8px; }
    .held-nft-info { flex: 1; }
    .held-nft-name { display: block; font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--cyan); margin-bottom: 5px; }
    .held-nft-id { font-size: 12px; opacity: 0.5; }
    .held-nft-badges { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .held-nft-badge { font-size: 9px; padding: 3px 8px; border: 1px solid var(--cyan); border-radius: 4px; color: var(--cyan); text-transform: uppercase; }

    .chat-terminal { height: 350px; display: flex; flex-direction: column; background: #000; border: 1px solid var(--line); border-radius: 8px; }
    .chat-log { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    .bubble { padding: 10px 14px; border-radius: 8px; max-width: 85%; line-height: 1.5; }
    .bubble.user { align-self: flex-end; background: rgba(0, 229, 255, 0.1); border: 1px solid rgba(0, 229, 255, 0.2); }
    .bubble.system { align-self: flex-start; background: rgba(0, 255, 200, 0.1); border: 1px solid rgba(0, 255, 200, 0.2); }
    .chat-terminal-actions { display: flex; padding: 15px; gap: 10px; border-top: 1px solid var(--line); }
    .chat-terminal-actions input { flex: 1; background: #050505; border: 1px solid var(--line); color: #fff; padding: 12px; border-radius: 4px; font: inherit; }
  </style>
</head>
<body>
  <div class='shell'>
    <header class='topbar'>
      <div class='brand'>
        <div class='dot'></div>
        <div class='title'>GGB // OS v8.7</div>
      </div>
      <button id='wallet-btn' class='btn' onclick='connectXaman(event)'>CONNECT XAMAN</button>
      <div id='xaman-status' class='status'>NOT CONNECTED</div>
    </header>

    <nav class='tabs'>
      <div class='tab active' data-tab='0'>CONSOLE</div>
      <div class='tab' data-tab='1'>STORYLINE</div>
      <div class='tab' data-tab='2'>FUSION LAB</div>
      <div class='tab' data-tab='3'>LEADERBOARD</div>
    </nav>

    <main class='content'>
      <section id='section-0' class='section active'>
         <div class='panel'>WELCOME TO THE TERMINAL.</div>
      </section>
      <section id='section-1' class='section'></section>
      <section id='section-2' class='section'>
        <div class='panel'>
          <div id='held-nft-display' class='held-nft-panel'></div>
          <div id='chat-terminal' class='chat-terminal'>
            <div id='chat-log' class='chat-log'></div>
            <div class='chat-terminal-actions'>
              <input id='chat-input' placeholder='INPUT DIRECTIVE...'>
              <button class='btn' onclick='startChatStream()'>SEND</button>
            </div>
          </div>
          <div style='margin-top:20px;'>
            <div id='nft-selection-track' class='nft-selection-track'></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const nftCollection = [
      { name: 'RELIC PRIME', image: 'https://placehold.co/150x150/000/00ffc8?text=RELIC', tokenId: '#001', network: 'XRPL', traits: ['Genesis'] },
      { name: 'RIFT HUNTER', image: 'https://placehold.co/150x150/000/00ffc8?text=HUNTER', tokenId: '#002', network: 'XRPL', traits: ['Armor'] }
    ];

    const state = {
      connected: false,
      wallet: '',
      chat: [],
      selectedNft: nftCollection[0],
      userNfts: []
    };

    function sanitizeMarkup(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function getSelectedNft() {
      return state.selectedNft || nftCollection[0];
    }

    function renderNftSelection() {
      const track = document.getElementById('nft-selection-track');
      if (!track) return;
      const collection = (state.userNfts && state.userNfts.length > 0) ? state.userNfts : nftCollection;
      track.innerHTML = collection.map((nft, index) => {
        const active = getSelectedNft()?.name === nft.name;
        return \`
          <button type="button" class="nft-select-card \${active ? 'active' : ''}" onclick="selectNft(\${index})">
            <img alt="\${sanitizeMarkup(nft.name)}" src="\${nft.image}">
            <span class="label">\${sanitizeMarkup(nft.name)}</span>
            <span class="meta">\${sanitizeMarkup(nft.tokenId || '')} | \${sanitizeMarkup(nft.network || '')}<br>\${sanitizeMarkup((nft.traits || []).join(' | '))}</span>
          </button>
        \`;
      }).join('');
    }

    function renderHeldNft() {
      const container = document.getElementById('held-nft-display');
      if (!container) return;
      const nft = getSelectedNft();
      if (!nft) {
        container.innerHTML = '<div class="held-nft-empty">NO OPERATIVE HELD</div>';
        return;
      }
      const traitsHtml = (nft.traits || []).map(t => \`<span class="held-nft-badge">\${sanitizeMarkup(t)}</span>\`).join('');
      container.innerHTML = \`
        <div class="held-nft-image-wrapper"><img src="\${nft.image}"></div>
        <div class="held-nft-info">
          <span class="held-nft-name">\${sanitizeMarkup(nft.name)}</span>
          <span class="held-nft-id">\${sanitizeMarkup(nft.tokenId)}</span>
          <div class="held-nft-badges">\${traitsHtml}</div>
        </div>
      \`;
    }

    function selectNft(index) {
      const collection = state.userNfts.length > 0 ? state.userNfts : nftCollection;
      state.selectedNft = collection[index];
      renderHeldNft();
      renderNftSelection();
    }

    function switchTab(index) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
      document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === index));
    }

    function initializeInteractiveShell() {
      document.querySelector('.tabs').addEventListener('click', (e) => {
        const tab = e.target.closest('.tab');
        if (tab) switchTab(Number(tab.dataset.tab));
      });
      document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') startChatStream();
      });
    }

    function bootApp() {
      initializeInteractiveShell();
      renderNftSelection();
      renderHeldNft();
    }

    window.selectNft = selectNft;
    document.addEventListener('DOMContentLoaded', bootApp);
  </script>
</body>
</html>
