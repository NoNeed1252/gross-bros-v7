<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>GUARDIAN BROADCAST OS v8.7 BETA</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap' rel='stylesheet'>
  <style>
    :root { --cyan: #00ffc8; --bg: #000; --panel: #06110f; --line: rgba(0,255,200,.18); }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }
    .shell {
      max-width: 1480px; min-height: calc(100vh - 24px); margin: 12px auto;
      border: 1px solid var(--line); border-radius: 24px; overflow: hidden;
      background: #050505; box-shadow: 0 0 100px -20px var(--cyan);
      display: flex; flex-direction: column;
    }
    @media (max-width: 640px) {
      .shell { margin: 0; min-height: 100vh; border-radius: 0; border: none; }
    }
    .topbar {
      background: #0a0a0a; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ff3b6b; box-shadow: 0 0 10px #ff3b6b; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    .title { font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 2px; }
    
    .tabs { display: flex; background: #0b0b0b; border-bottom: 1px solid var(--line); overflow-x: auto; }
    .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-size: 12px; opacity: 0.5; border-right: 1px solid var(--line); white-space: nowrap; }
    .tab.active { opacity: 1; background: rgba(0,255,200,0.05); box-shadow: inset 0 -2px 0 var(--cyan); }

    .content { flex: 1; padding: 16px; display: flex; flex-direction: column; }
    .section { display: none; flex: 1; }
    .section.active { display: flex; flex-direction: column; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 850px) { .grid-2 { grid-template-columns: 1fr; } }

    .panel {
      background: rgba(7,18,17,0.95);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      position: relative;
    }

    /* BRO OF THE DAY STUNNING UI */
    .botd-panel { display: flex; flex-direction: column; gap: 20px; }
    .botd-header h1 { font-family: 'Orbitron', sans-serif; font-size: 32px; margin: 0; color: #fff; text-shadow: 0 0 20px var(--cyan); }
    .botd-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 120px; padding: 12px; border: 1px solid var(--cyan); 
      background: rgba(0,255,200,0.05); color: var(--cyan); border-radius: 12px;
      font-family: 'Share Tech Mono', monospace; cursor: pointer; transition: 0.3s;
      text-align: center; text-decoration: none; font-size: 13px;
    }
    .btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }
    
    .nft-showcase {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .nft-frame {
      width: 100%; max-width: 340px; aspect-ratio: 1/1; position: relative;
      border: 1px solid var(--cyan); border-radius: 16px; overflow: hidden;
      background: #000; box-shadow: 0 0 40px rgba(0,255,200,0.2);
    }
    .nft-frame img { width: 100%; height: 100%; object-fit: cover; }
    .nft-frame::before {
      content: 'NEURAL LINK ACTIVE'; position: absolute; top: 12px; right: 12px;
      font-size: 8px; background: var(--cyan); color: #000; padding: 2px 6px; border-radius: 4px; z-index: 10;
    }
    .nft-lore { font-size: 14px; line-height: 1.6; color: #fff; opacity: 0.8; text-align: center; max-width: 400px; }

    /* CHAT TERMINAL */
    .chat-log { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 8px; }
    .bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.4; }
    .bubble.user { align-self: flex-end; background: rgba(0,255,200,0.1); border: 1px solid rgba(0,255,200,0.2); border-bottom-right-radius: 2px; }
    .bubble.system { align-self: flex-start; background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2); border-bottom-left-radius: 2px; }
    
    .input-row { display: flex; gap: 10px; margin-top: 16px; }
    input { flex: 1; background: #000; border: 1px solid var(--line); border-radius: 10px; padding: 12px; color: #fff; font-family: inherit; outline: none; }
    input:focus { border-color: var(--cyan); }

    /* STATUS BAR */
    .sync-bar { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--line); font-size: 10px; color: rgba(0,255,200,0.4); display: flex; justify-content: space-between; }

    @media (max-width: 480px) {
      .botd-header h1 { font-size: 24px; }
      .btn { width: 100%; flex: none; }
    }
  </style>
</head>
<body>
  <div class='shell'>
    <header class='topbar'>
      <div class='brand'><div class='dot'></div><div class='title'>GGB TERMINAL v8.7</div></div>
      <button id='wallet-btn' class='btn' style='padding: 6px 12px; min-width: auto;' onclick='connectXaman(event)'>CONNECT</button>
    </header>

    <nav class='tabs'>
      <div class='tab active' onclick='switchTab(0)'>CONSOLE</div>
      <div class='tab' onclick='switchTab(1)'>FUSION</div>
      <div class='tab' onclick='switchTab(2)'>LORE</div>
    </nav>

    <main class='content'>
      <section id='section-0' class='section active'>
        <div class='grid-2'>
          <div class='panel botd-panel'>
            <div class='botd-header'>
              <div style='font-size: 10px; letter-spacing: 2px; color: var(--cyan); margin-bottom: 8px;'>NEURAL HIGHLIGHT</div>
              <h1>BRO OF THE DAY</h1>
            </div>
            <div class='botd-actions'>
              <a href='#' class='btn' onclick='switchTab(1)'>OPEN LAB</a>
              <a href='https://xrp.cafe/collection/galactic-gross-bros' target='_blank' class='btn'>MARKETPLACE</a>
            </div>
            <div class='sync-bar'>
              <span>SIGNAL: STABLE</span>
              <span id='bro-of-day-status'>SYNCING...</span>
            </div>
          </div>

          <div class='panel nft-showcase'>
            <div class='nft-frame'>
              <img id='bro-of-day-image' src='' alt='BRO'>
            </div>
            <div id='bro-of-day-description' class='nft-lore'>Loading transmission...</div>
          </div>
        </div>
      </section>

      <section id='section-1' class='section'>
        <div class='panel' style='flex: 1; display: flex; flex-direction: column;'>
          <div class='chat-log' id='chat-log'></div>
          <div class='input-row'>
            <input id='chat-input' placeholder='Send command...' maxlength='140'>
            <button class='btn' style='min-width: 80px;' onclick='startChatStream()'>SEND</button>
          </div>
        </div>
      </section>

      <section id='section-2' class='section'>
        <div class='panel'>
          <h2 style='font-family: Orbitron; color: #fff;'>ARCHIVE</h2>
          <p class='nft-lore' style='text-align: left;'>The Gross Bros were forged in the fracture. Machine-linked armor. Neural ghosts. The broadcast never stops.</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const state = { chat: [], currentTab: 0 };
    const BRO_COLLECTION_ISSUER = "rP1wMvanhfmsm7Af4FcHvSvfhash43LWSY";

    function switchTab(idx) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
      document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
    }

    async function loadBroOfDay() {
      try {
        const res = await fetch('https://xrplcluster.com', {
          method: 'POST',
          body: JSON.stringify({ method: 'account_nfts', params: [{ account: BRO_COLLECTION_ISSUER }] })
        });
        const data = await res.json();
        const nfts = data.result.account_nfts;
        const randomNft = nfts[Math.floor(Math.random() * nfts.length)];
        
        // Simple mock for now, ideally fetch metadata from URI
        document.getElementById('bro-of-day-image').src = 'https://ipfs.io/ipfs/QmZpB4K1mS6Pz8E9m7P2m3P4m5P6m7P8m9n0o1p2q3r4s'; // Placeholder
        document.getElementById('bro-of-day-description').textContent = "A relic of the initial fracture. Signal locked.";
        document.getElementById('bro-of-day-status').textContent = "SYNCED // #" + randomNft.NFTokenID.slice(-4);
      } catch (e) {
        document.getElementById('bro-of-day-status').textContent = "SIGNAL LOST";
      }
    }

    async function startChatStream() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      
      appendChat('user', text);
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
      });
      
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let assistantMsg = { role: 'system', text: '' };
      state.chat.push(assistantMsg);

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              assistantMsg.text += data.token;
              renderChat();
            } catch (e) {}
          }
        }
      }
    }

    function appendChat(role, text) {
      state.chat.push({ role, text });
      renderChat();
    }

    function renderChat() {
      const log = document.getElementById('chat-log');
      log.innerHTML = state.chat.map(m => `<div class='bubble ${m.role}'>${m.text}</div>`).join('');
      log.scrollTop = log.scrollHeight;
    }

    window.onload = loadBroOfDay;
  </script>
</body>
</html>
