<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROSS BROS • BRO OF THE DAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Share Tech Mono', monospace; background: #000; color: #00ffc8; }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .alien-monitor {
            background: #050505;
            border: 1px solid #333;
            box-shadow: 0 0 0 18px #0a0a0a, 0 30px 70px -15px rgba(0,0,0,0.95), 0 0 100px -20px #00ffc8;
            border-radius: 24px;
            overflow: hidden;
            max-width: 1640px;
            margin: 0 auto;
        }
        .crt::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(transparent 0px, transparent 5px, rgba(0,255,200,0.15) 5px, rgba(0,255,200,0.15) 10px);
            animation: scanline 8s linear infinite;
            z-index: 10;
            pointer-events: none;
        }
        @keyframes scanline { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
        .tab-active { border-bottom: 5px solid #00ffc8; color: #00ffc8; background: #1a1a1a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4">

<div class="alien-monitor h-[94vh] flex flex-col shadow-2xl relative w-full">

    <!-- HEADER -->
    <div class="bg-[#151515] border-b-8 border-[#0a0a0a] px-6 py-5 flex items-center justify-between gap-6">
        <div class="flex items-center gap-3">
            <div class="w-6 h-6 bg-red-600 rounded-full animate-pulse"></div>
            <div class="header-font text-xl tracking-widest">GROSS BROS OS v7</div>
        </div>
        
        <div onclick="connectXaman()" class="cursor-pointer px-6 py-3 border border-[#00ffc8]/60 hover:border-[#00ffc8] rounded-3xl flex items-center gap-3 text-sm text-[#00ffc8]">
            <i class="fa-solid fa-wallet"></i>
            <span id="wallet-text">CONNECT XAMAN</span>
        </div>
        
        <p id="xaman-status" class="text-xs text-[#00ffc8]/60">Wallet disconnected.</p>
    </div>

    <!-- TABS -->
    <div class="bg-[#0f0f0f] border-b border-[#333] flex text-sm overflow-x-auto">
        <div onclick="switchTab(0)" class="tab px-6 py-5 cursor-pointer tab-active">MAIN CONSOLE</div>
        <div onclick="switchTab(1)" class="tab px-6 py-5 cursor-pointer">STORYLINE</div>
        <div onclick="switchTab(2)" class="tab px-6 py-5 cursor-pointer">FUSION LAB</div>
        <div onclick="switchTab(3)" class="tab px-6 py-5 cursor-pointer">GROSS REWARDS</div>
    </div>

    <!-- CONTENT -->
    <div class="flex-1 overflow-auto crt bg-[#050505] p-8 relative text-[#00ffc8]">
        <div id="content-0" class="tab-content active">
            <h1 class="header-font text-5xl text-center mb-8">BRO OF THE DAY</h1>
            <p class="text-center max-w-2xl mx-auto">Test wallet connection below. We'll restore full design once wallet works.</p>
        </div>
    </div>
</div>

<script>
    const XAMANAPIKEY = '5f30fcbe-a810-490b-8fd5-500a37568a49';
    const XAMANAPIBASE = 'https://xumm.app/api/v1/platform';

    function switchTab(n) {
        alert("Tab " + (n+1) + " selected");
    }

    async function connectXaman() {
        try {
            const response = await fetch(`${XAMANAPIBASE}/payload`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': XAMANAPIKEY
                },
                body: JSON.stringify({
                    txjson: { TransactionType: 'SignIn' },
                    options: { submit: false, expire: 5 }
                })
            });

            const payload = await response.json();
            if (payload.next?.always) {
                window.open(payload.next.always, '_blank');
                document.getElementById('xaman-status').textContent = "Check Xaman app or new tab...";
            } else {
                alert("Failed to open Xaman");
            }
        } catch (err) {
            console.error(err);
            alert("Xaman request failed. Make sure Xaman app is installed and open on your phone.");
        }
    }
</script>
</body>
</html>
