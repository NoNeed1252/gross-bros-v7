<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROSS BROS • GUARDIAN BROADCAST OS v7.2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&display=swap');
        :root { --cyan: #00ffc8; }
        body { font-family: 'Share Tech Mono', monospace; background: #000; }
        .header-font { font-family: 'Orbitron', sans-serif; }

        .alien-monitor {
            background: #050505;
            border: 36px solid #1f1f1f;
            box-shadow: 0 0 0 22px #0a0a0a, 0 40px 90px -20px rgba(0,0,0,0.95), 0 0 130px -30px var(--cyan);
            border-radius: 32px;
            overflow: hidden;
            max-width: 1480px;
            margin: 20px auto;
        }

        .crt::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(transparent 0px, transparent 4px, rgba(0,255,200,0.12) 4px, rgba(0,255,200,0.12) 8px);
            animation: scanline 7s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes scanline { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }

        .tab-active { border-bottom: 4px solid var(--cyan); color: var(--cyan); }
    </style>
</head>
<body class="bg-black text-[#00ffc8] min-h-screen p-4">

<div class="alien-monitor h-[92vh] flex flex-col relative crt">

    <!-- HEADER -->
    <div class="bg-[#0a0a0a] border-b-4 border-[#00ffc8]/30 px-8 py-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-5 h-5 bg-red-500 rounded-full animate-pulse"></div>
            <div class="header-font text-2xl tracking-widest">GUARDIAN BROADCAST OS v7.2.1</div>
        </div>
        
        <div onclick="connectXaman()" class="cursor-pointer px-8 py-4 border-2 border-[#00ffc8]/70 hover:border-[#00ffc8] rounded-2xl flex items-center gap-3 text-lg font-medium hover:bg-[#00ffc8]/10 transition-all">
            <i class="fa-solid fa-wallet"></i>
            <span id="wallet-text">CONNECT XAMAN</span>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs-container flex border-b border-[#00ffc8]/20 text-sm">
        <div onclick="switchTab(0)" id="tab-0" class="tab px-8 py-5 cursor-pointer tab-active">MAIN CONSOLE</div>
        <div onclick="switchTab(1)" id="tab-1" class="tab px-8 py-5 cursor-pointer">STORYLINE</div>
        <div onclick="switchTab(2)" id="tab-2" class="tab px-8 py-5 cursor-pointer">FUSION LAB</div>
        <div onclick="switchTab(3)" id="tab-3" class="tab px-8 py-5 cursor-pointer">REWARDS</div>
    </div>

    <!-- CONTENT -->
    <div class="flex-1 overflow-auto p-8 relative z-10" id="main-content">
        <!-- Default content loaded by JS -->
    </div>

</div>

<script>
    const XAMANAPIKEY = '5f30fcbe-a810-490b-8fd5-500a37568a49';
    const XAMANAPIBASE = 'https://xumm.app/api/v1/platform';
    let currentAddress = null;

    function switchTab(n) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
        document.getElementById('tab-' + n).classList.add('tab-active');
        
        const content = document.getElementById('main-content');
        content.innerHTML = `<div class=\"text-center py-20\"><p class=\"text-2xl\">Tab ${n} content coming soon...</p></div>`;
    }

    async function connectXaman() {
        try {
            setWalletUI(false);
            document.getElementById('wallet-text').textContent = "CONNECTING...";

            const createRes = await fetch('/api/xaman?action=create-payload', { method: 'POST' });
            const payload = await createRes.json();

            if (!payload.next?.always) {
                throw new Error("Failed to create Xaman request");
            }

            window.open(payload.next.always, '_blank');

            let attempts = 0;
            const maxAttempts = 40;

            const pollInterval = setInterval(async () => {
                attempts++;
                if (attempts > maxAttempts) {
                    clearInterval(pollInterval);
                    alert("Timed out waiting for Xaman approval.");
                    setWalletUI(false);
                    return;
                }

                try {
                    const checkRes = await fetch(`/api/xaman?action=check-payload&uuid=${payload.uuid}`);
                    const status = await checkRes.json();

                    if (status.meta?.signed || status.signed) {
                        clearInterval(pollInterval);
                        const address = status.response?.account || status.account;
                        if (address) {
                            const session = { connected: true, address };
                            localStorage.setItem('grossbros:xaman-session', JSON.stringify(session));
                            setWalletUI(true, address);
                            alert("✅ Successfully connected!");
                        }
                    } else if (status.meta?.expired) {
                        clearInterval(pollInterval);
                        alert("Request expired.");
                        setWalletUI(false);
                    }
                } catch (e) {
                    console.error(e);
                }
            }, 2500);

        } catch (err) {
            console.error(err);
            alert("Failed to connect to Xaman. Try again.");
            setWalletUI(false);
        }
    }


    // Initialize
    window.onload = () => {
        switchTab(0);
        console.log("✅ Gross Bros OS loaded cleanly");
    };
</script>
</body>
</html>
