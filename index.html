<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROSS BROS • GUARDIAN BROADCAST OS v7.2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&display=swap');
        :root { --cyan: #00ffc8; }
        body { font-family: 'Share Tech Mono', monospace; background: #000; color: #00ffc8; }
        .header-font { font-family: 'Orbitron', sans-serif; }

        .alien-monitor {
            background: #050505;
            border: 36px solid #1f1f1f;
            box-shadow: 0 0 0 22px #0a0a0a, 0 40px 90px -20px rgba(0,0,0,0.95), 0 0 130px -30px var(--cyan);
            border-radius: 32px;
            overflow: hidden;
            max-width: 1480px;
            margin: 20px auto;
        }
        .crt::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(transparent 0px, transparent 5px, rgba(0,255,200,0.15) 5px, rgba(0,255,200,0.15) 10px);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes scanline { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
        .tab-active { border-bottom: 5px solid var(--cyan); color: var(--cyan); background: #1a1a1a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-black min-h-screen p-4">

<div class="alien-monitor h-[94vh] flex flex-col relative crt shadow-2xl">

    <!-- HEADER -->
    <div class="bg-[#0a0a0a] border-b-4 border-[#00ffc8]/30 px-8 py-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-6 h-6 bg-red-600 rounded-full animate-pulse"></div>
            <div class="header-font text-2xl tracking-widest">GUARDIAN BROADCAST OS v7.2.1</div>
        </div>
        
        <div onclick="connectXaman()" class="cursor-pointer px-8 py-4 border-2 border-[#00ffc8]/70 hover:border-[#00ffc8] rounded-2xl flex items-center gap-3 text-lg hover:bg-[#00ffc8]/10 transition-all">
            <i class="fa-solid fa-wallet"></i>
            <span id="wallet-text">CONNECT XAMAN</span>
        </div>
        
        <p id="xaman-status" class="text-sm text-[#00ffc8]/60">Wallet disconnected.</p>
    </div>

    <!-- TABS -->
    <div class="bg-[#111] border-b border-[#00ffc8]/20 flex text-sm overflow-x-auto">
        <div onclick="switchTab(0)" id="tab-0" class="tab px-8 py-5 cursor-pointer tab-active">MAIN CONSOLE</div>
        <div onclick="switchTab(1)" id="tab-1" class="tab px-8 py-5 cursor-pointer">STORYLINE</div>
        <div onclick="switchTab(2)" id="tab-2" class="tab px-8 py-5 cursor-pointer">FUSION LAB</div>
        <div onclick="switchTab(3)" id="tab-3" class="tab px-8 py-5 cursor-pointer">GROSS REWARDS</div>
    </div>

    <!-- CONTENT -->
    <div class="flex-1 overflow-auto p-8 relative z-10 bg-[#050505]" id="content-area">
        <!-- Tab contents loaded here -->
    </div>

</div>

<script>
    let currentWalletAddress = null;

    function shortenAddress(address) {
        if (!address) return 'Unknown';
        return address.slice(0, 6) + '…' + address.slice(-6);
    }

    function setWalletUI(connected, address = '') {
        currentWalletAddress = address;
        const walletText = document.getElementById('wallet-text');
        const status = document.getElementById('xaman-status');
        
        if (walletText) walletText.textContent = connected ? 'XAMAN CONNECTED' : 'CONNECT XAMAN';
        if (status) status.textContent = connected ? `Connected: ${shortenAddress(address)}` : 'Wallet disconnected.';
    }

    function switchTab(n) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('tab-active', i === n);
        });

        const area = document.getElementById('content-area');
        area.innerHTML = `
            <div class="tab-content active">
                <h1 class="header-font text-5xl mb-6">TAB ${n} - ${['MAIN CONSOLE','STORYLINE','FUSION LAB','GROSS REWARDS'][n]}</h1>
                <p class="text-[#00ffc8]/70">Content for this tab will be expanded later.</p>
            </div>
        `;
    }

    async function connectXaman() {
        try {
            const walletText = document.getElementById('wallet-text');
            walletText.textContent = "CONNECTING...";

            // Create payload via proxy
            const createRes = await fetch('/api/xaman?action=create-payload', { 
                method: 'POST' 
            });
            const payload = await createRes.json();

            if (!payload.next?.always) {
                throw new Error("Failed to create Xaman request");
            }

            window.open(payload.next.always, '_blank');

            // Poll for result
            let attempts = 0;
            const maxAttempts = 35;
            const pollInterval = setInterval(async () => {
                attempts++;
                if (attempts > maxAttempts) {
                    clearInterval(pollInterval);
                    alert("Timed out waiting for approval.");
                    setWalletUI(false);
                    return;
                }

                try {
                    const checkRes = await fetch(`/api/xaman?action=check-payload&uuid=${payload.uuid}`);
                    const status = await checkRes.json();

                    if (status.meta?.signed || status.signed) {
                        clearInterval(pollInterval);
                        const address = status.response?.account || status.account;
                        if (address) {
                            const session = { connected: true, address };
                            localStorage.setItem('grossbros:xaman-session', JSON.stringify(session));
                            setWalletUI(true, address);
                            alert("✅ Wallet connected successfully!");
                        }
                    } else if (status.meta?.expired || status.expired) {
                        clearInterval(pollInterval);
                        alert("Request expired. Please try again.");
                        setWalletUI(false);
                    }
                } catch (e) {
                    console.error(e);
                }
            }, 2500);

        } catch (err) {
            console.error(err);
            alert("Xaman connection failed. Please try again.");
            setWalletUI(false);
        }
    }

    // Load saved session
    function loadSavedSession() {
        const saved = localStorage.getItem('grossbros:xaman-session');
        if (saved) {
            try {
                const session = JSON.parse(saved);
                if (session.connected && session.address) {
                    setWalletUI(true, session.address);
                }
            } catch (e) {}
        }
    }

    // Initialize
    window.onload = () => {
        switchTab(0);
        loadSavedSession();
        console.log("✅ Gross Bros OS v7.2.1 loaded");
    };
</script>
</body>
</html>
