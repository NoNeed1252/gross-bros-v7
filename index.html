<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>THE DEN // GROSS BROS OS</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap' rel='stylesheet'>
  <style>
    :root { 
      --neon-green: #39ff14; 
      --amber: #ffb100; 
      --cyan: #00f3ff; 
      --bg: #050505; 
      --line: rgba(57, 255, 20, 0.15); 
    }
    
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--neon-green); font-family: 'Share Tech Mono', monospace; overflow: hidden; }

    /* CRT Effect */
    body::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    body::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: rgba(18, 16, 16, 0.1);
      opacity: 0;
      z-index: 2;
      pointer-events: none;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.27861; }
      5% { opacity: 0.34769; }
      10% { opacity: 0.23604; }
      15% { opacity: 0.90626; }
      20% { opacity: 0.18128; }
      25% { opacity: 0.83891; }
      30% { opacity: 0.65583; }
      35% { opacity: 0.57807; }
      40% { opacity: 0.26559; }
      45% { opacity: 0.84693; }
      50% { opacity: 0.96019; }
      55% { opacity: 0.08594; }
      60% { opacity: 0.20313; }
      65% { opacity: 0.71988; }
      70% { opacity: 0.53455; }
      75% { opacity: 0.37288; }
      80% { opacity: 0.71428; }
      85% { opacity: 0.70419; }
      90% { opacity: 0.7003; }
      95% { opacity: 0.36108; }
      100% { opacity: 0.24387; }
    }

    .terminal-container {
      width: 100vw;
      height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      z-index: 1;
      position: relative;
    }

    header {
      border-bottom: 2px solid var(--neon-green);
      padding-bottom: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-shadow: 0 0 5px var(--neon-green);
    }

    .title { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: var(--cyan); }
    .status { color: var(--amber); }

    #output {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 20px;
      padding-right: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--neon-green) transparent;
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-thumb { background: var(--neon-green); }

    .input-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prompt { color: var(--amber); font-weight: bold; }
    
    input {
      background: transparent;
      border: none;
      color: var(--neon-green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      outline: none;
      flex: 1;
      text-shadow: 0 0 5px var(--neon-green);
    }

    .cmd-out { margin-bottom: 15px; }
    .system { color: var(--amber); }
    .cyan { color: var(--cyan); }
    .green { color: var(--neon-green); }

    @media (max-width: 600px) {
      .title { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class='terminal-container'>
    <header>
      <div class='title'>THE DEN // GB-OS v7.2.1</div>
      <div class='status'>SIGNAL: STABLE</div>
    </header>
    
    <div id='output'>
      <div class='cmd-out system'>[SYSTEM] BOOT SEQUENCE COMPLETE...</div>
      <div class='cmd-out system'>[SYSTEM] WELCOME OPERATIVE. TYPE 'HELP' FOR COMMANDS.</div>
    </div>

    <div class='input-line'>
      <span class='prompt'>operative@den:~$</span>
      <input type='text' id='terminal-input' autofocus spellcheck='false' autocomplete='off'>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const input = document.getElementById('terminal-input');

    function print(text, className = '') {
      const div = document.createElement('div');
      div.className = 'cmd-out ' + className;
      div.textContent = text;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    async function handleCommand(cmd) {
      const parts = cmd.trim().split(/\s+/);
      const command = parts[0].toLowerCase();

      print('operative@den:~$ ' + cmd);

      switch(command) {
        case 'help':
          print('AVAILABLE COMMANDS:');
          print('  HELP          - DISPLAY THIS MENU');
          print('  CLEAR         - CLEAR TERMINAL');
          print('  XAMAN-AUTH    - INITIALIZE XAMAN AUTHENTICATION PROTOCOL', 'cyan');
          print('  STATUS        - CHECK SYSTEM INTEGRITY', 'system');
          break;
        case 'clear':
          output.innerHTML = '';
          break;
        case 'status':
          print('SYSTEM: NOMINAL');
          print('DECK: THE DEN');
          print('UI: RETRO-CYBERPUNK CRT');
          break;
        case 'xaman-auth':
          print('[INIT] REQUESTING XAMAN AUTHENTICATION...', 'cyan');
          try {
            const res = await fetch('/api/xaman?action=create-payload', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ txjson: { TransactionType: 'SignIn' } })
            });
            const payload = await res.json();
            if (payload?.next?.always) {
              print('[LINK] AUTHENTICATION URL GENERATED. OPENING...', 'green');
              window.open(payload.next.always, '_blank');
              print('[WAIT] AWAITING SIGNATURE ON MOBILE DEVICE...', 'system');
            } else {
              print('[ERROR] FAILED TO GENERATE AUTH LINK', 'system');
            }
          } catch (e) {
            print('[ERROR] SIGNAL INTERRUPTED: ' + e.message, 'system');
          }
          break;
        case '':
          break;
        default:
          print('COMMAND NOT RECOGNIZED: ' + command, 'system');
      }
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const cmd = input.value;
        input.value = '';
        handleCommand(cmd);
      }
    });

    // Auto-focus input
    document.addEventListener('click', () => input.focus());
  </script>
</body>
</html>
