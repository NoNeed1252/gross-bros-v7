<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Xaman config loader</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #0f1115; color: #eef2ff; }
      .card { max-width: 760px; margin: 0 auto; padding: 24px; background: #171a21; border: 1px solid #2a3140; border-radius: 16px; }
      code, pre { background: #0c0f14; border: 1px solid #263042; border-radius: 12px; padding: 12px; overflow: auto; }
      .row { display: grid; gap: 12px; margin-top: 20px; }
      .label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #93a4c3; }
      .value { word-break: break-word; }
      .status { margin-top: 16px; color: #bcd0ff; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Xaman configuration</h1>
      <p>This page loads public runtime settings from <code>/api/xaman-config</code> so the static frontend never reads server-only environment variables directly.</p>

      <div class="row">
        <div>
          <div class="label">Xaman public API key</div>
          <pre class="value" id="xamanApiKey">Loading…</pre>
        </div>
        <div>
          <div class="label">Supabase URL</div>
          <pre class="value" id="supabaseUrl">Loading…</pre>
        </div>
      </div>

      <p class="status" id="status">Fetching config…</p>
    </main>

    <script>
      async function loadConfig() {
        const status = document.getElementById('status');
        const xamanApiKeyEl = document.getElementById('xamanApiKey');
        const supabaseUrlEl = document.getElementById('supabaseUrl');

        try {
          const response = await fetch('/api/xaman-config', { cache: 'no-store' });
          const data = await response.json().catch(() => null);

          if (!response.ok || !data || !data.ok) {
            throw new Error((data && data.error) || 'Unable to load config');
          }

          xamanApiKeyEl.textContent = data.xamanApiKey || 'not provided';
          supabaseUrlEl.textContent = data.supabaseUrl || 'not provided';
          window.__APP_CONFIG__ = {
            xamanApiKey: data.xamanApiKey,
            supabaseUrl: data.supabaseUrl,
          };
          status.textContent = 'Config loaded successfully.';
        } catch (error) {
          xamanApiKeyEl.textContent = 'unavailable';
          supabaseUrlEl.textContent = 'unavailable';
          status.textContent = error instanceof Error ? error.message : 'Failed to load config.';
        }
      }

      loadConfig();
    </script>
  </body>
</html>
