<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>GUARDIAN BROADCAST OS v8.8 BETA</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap' rel='stylesheet'>
  <style>
    :root { --cyan: #00ffc8; --bg: #000; --panel: #06110f; --line: rgba(0,255,200,.18); --locked: #ff3b6b; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--cyan); font-family: 'Share Tech Mono', monospace; }
    .shell { max-width: 1480px; min-height: calc(100vh - 24px); margin: 12px auto; border: 24px solid #1f1f1f; border-radius: 24px; overflow: hidden; background: #050505; box-shadow: 0 30px 70px -20px rgba(0,0,0,.95), 0 0 100px -20px var(--cyan); display: flex; flex-direction: column; }
    .topbar { background: #0a0a0a; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .dot { width: 14px; height: 14px; border-radius: 999px; background: #ff3b6b; box-shadow: 0 0 18px rgba(255,59,107,.85); animation: pulse 1.25s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .title { font-family: 'Orbitron', sans-serif; letter-spacing: .35em; text-transform: uppercase; font-size: clamp(14px, 2vw, 22px); }
    .wallet-btn, .btn { border: 1px solid rgba(0,255,200,.5); background: rgba(0,255,200,.06); color: var(--cyan); border-radius: 18px; padding: 12px 18px; cursor: pointer; font: inherit; transition: .18s ease; }
    .wallet-btn:hover, .btn:hover { background: rgba(0,255,200,.12); border-color: var(--cyan); }
    .tabs { display: flex; border-bottom: 1px solid var(--line); background: #0b0b0b; }
    .tab { flex: 1; padding: 16px; text-align: center; cursor: pointer; border-right: 1px solid rgba(0,255,200,.06); transition: .18s ease; }
    .tab.active { color: var(--cyan); background: linear-gradient(180deg, rgba(0,255,200,0.14), transparent); box-shadow: inset 0 -2px 0 var(--cyan); }
    .tab.disabled { color: rgba(255,59,107,0.4); cursor: not-allowed; }
    .content { flex: 1; padding: 24px; }
    .section { display: none; }
    .section.active { display: block; }
    .panel { background: #06110f; border: 1px solid var(--line); border-radius: 24px; padding: 24px; margin-bottom: 24px; }
    .lock-overlay { text-align: center; padding: 60px; color: var(--locked); font-family: 'Orbitron', sans-serif; }
    .lock-icon { font-size: 48px; margin-bottom: 20px; animation: pulse 2s infinite; }
    .trade-ui { display: grid; gap: 20px; grid-template-columns: 1fr 1fr; }
    input, select { background: #000; border: 1px solid var(--line); color: var(--cyan); padding: 12px; border-radius: 8px; font-family: inherit; width: 100%; }
    label { font-size: 10px; letter-spacing: 0.2em; margin-bottom: 4px; display: block; color: rgba(0,255,200,0.6); }
  </style>
</head>
<body>
  <div class='shell'>
    <header class='topbar'>
      <div class='brand'>
        <div class='dot'></div>
        <div class='title'>GUARDIAN BROADCAST OS v8.8</div>
      </div>
      <button id='connect-btn' class='wallet-btn' onclick='toggleConnect()'>CONNECT WALLET</button>
    </header>

    <nav class='tabs'>
      <div class='tab active' onclick='switchTab(0)'>CONSOLE</div>
      <div id='fusion-tab' class='tab disabled' onclick='switchTab(1)'>FUSION LAB [LOCKED]</div>
    </nav>

    <main class='content'>
      <section id='section-0' class='section active'>
        <div class='panel'>
          <h2 style='font-family:Orbitron;'>SYSTEM STATUS</h2>
          <p>Neural relay initialized. Connect wallet to verify Taxon 1 clearance.</p>
          <div id='status-msg' style='color: var(--locked);'>IDENTITY NOT VERIFIED</div>
        </div>
      </section>

      <section id='section-1' class='section'>
        <div id='fusion-locked' class='panel lock-overlay'>
          <div class='lock-icon'>⚠</div>
          <h3>ACCESS DENIED</h3>
          <p>Taxon 1 NFT (ID: 1) not detected in primary ledger.</p>
        </div>
        <div id='fusion-unlocked' style='display: none;'>
          <div class='panel'>
            <h2 style='font-family:Orbitron;'>FUSION TRADE BOT</h2>
            <div class='trade-ui'>
              <div>
                <label>ASSET PAIR</label>
                <select id='pair'><option>XRP / RLUSD</option><option>GROSS / XRP</option></select>
              </div>
              <div>
                <label>EXECUTION DEPTH</label>
                <input type='number' placeholder='0.00'>
              </div>
            </div>
            <button class='btn' style='width: 100%; margin-top: 20px;' onclick='executeTrade()'>INITIATE LEDGER TRANSACTION</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const state = { connected: false, hasNft: false };

    function switchTab(index) {
      if (index === 1 && !state.hasNft) return;
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
      document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === index));
    }

    async function toggleConnect() {
      state.connected = !state.connected;
      const btn = document.getElementById('connect-btn');
      const status = document.getElementById('status-msg');
      
      if (state.connected) {
        btn.textContent = "VERIFYING NFT...";
        // Simulated XRPL Check for Taxon 1 NFT
        setTimeout(() => {
          state.hasNft = true; 
          btn.textContent = "rJ...9x VERIFIED";
          status.textContent = "TAXON 1 CLEARANCE GRANTED";
          status.style.color = "var(--cyan)";
          unlockFusion();
        }, 1500);
      } else {
        btn.textContent = "CONNECT WALLET";
        status.textContent = "IDENTITY NOT VERIFIED";
        status.style.color = "var(--locked)";
        lockFusion();
      }
    }

    function unlockFusion() {
      const tab = document.getElementById('fusion-tab');
      tab.classList.remove('disabled');
      tab.textContent = "FUSION LAB [UNLOCKED]";
      document.getElementById('fusion-locked').style.display = 'none';
      document.getElementById('fusion-unlocked').style.display = 'block';
    }

    function lockFusion() {
      const tab = document.getElementById('fusion-tab');
      tab.classList.add('disabled');
      tab.textContent = "FUSION LAB [LOCKED]";
      document.getElementById('fusion-locked').style.display = 'block';
      document.getElementById('fusion-unlocked').style.display = 'none';
      switchTab(0);
    }

    function executeTrade() {
      alert("Trade request signed and broadcast to XRPL.");
    }
  </script>
</body>
</html>
